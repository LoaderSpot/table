name: Deploy to Vercel

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-vercel.yml
      - table/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: table

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: table/.node-version
          cache: npm
          cache-dependency-path: table/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project settings
        run: npx vercel@latest pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel output
        run: npx vercel@latest build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel production
        run: npx vercel@latest deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
