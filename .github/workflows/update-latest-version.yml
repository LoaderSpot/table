name: Update Latest Version

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-latest-version.yml
      - scripts/update_latest_version.py
      - table/versions.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-latest-version-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  update-latest-version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.3"
          check-latest: false

      - name: Generate latest.json
        env:
          PYTHONUTF8: "1"
        run: |
          set -euo pipefail
          python scripts/update_latest_version.py

      - name: Commit latest.json if changed
        run: |
          set -euo pipefail
          git add latest.json

          if git diff --cached --quiet; then
            echo "No changes in latest.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update latest.json [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
